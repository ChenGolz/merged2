<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PetConnect Rebuilt{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .brand { font-size: 1.35rem; font-weight: 700; color: white; }
    .muted { color: var(--muted); }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    }
    .card h2, .card h3 { margin-top: 0; }
    .stack { display: grid; gap: 10px; }
    input, textarea, button {
      width: 100%; border-radius: 10px; border: 1px solid var(--border);
      background: #0b1220; color: var(--text); padding: 11px 12px; font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      background: linear-gradient(180deg, #0ea5e9 0%, #0284c7 100%);
      border: none; font-weight: 600; cursor: pointer;
    }
    button.secondary { background: #1e293b; border: 1px solid var(--border); }
    button.warn { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); }
    button.bad { background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%); }
    .list { display: grid; gap: 10px; }
    .chip {
      display: inline-block; padding: 4px 10px; border-radius: 999px; background: #0b1220; border: 1px solid var(--border); color: var(--muted);
      font-size: .85rem;
    }
    .thumb { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 14px; background: #0b1220; border: 1px solid var(--border); }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .space-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .person-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .cluster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .item-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .meta { font-size: .92rem; color: var(--muted); }
    .sep { height: 1px; background: var(--border); margin: 16px 0; }
    .hint-good { color: #86efac; }
    .hint-warn { color: #fde68a; }
    .empty { padding: 18px; border: 1px dashed var(--border); border-radius: 14px; color: var(--muted); }
    code { background: #020617; padding: 2px 6px; border-radius: 6px; }
    .small { font-size: .9rem; }
    .hero {
      display: grid; gap: 18px; align-items: center;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, .9fr);
    }
    .score { font-weight: 700; font-size: 1.1rem; }
    .pill-strong { color: #bbf7d0; }
    .pill-good { color: #fde68a; }
    .pill-possible { color: #cbd5e1; }
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <a class="brand" href="/">PetConnect Rebuilt</a>
        <div class="muted small">Upload references, process media, and now search your face library from a single photo.</div>
      </div>
      <div class="row small">
        <a href="/">Home</a>
        <a href="/search">Search by photo</a>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
